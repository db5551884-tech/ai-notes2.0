<!DOCTYPE html>
<html>
<head>

<title>AI Notes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="mb-4 text-center">AI Notes</h1>
<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<textarea class="form-control" name="text" rows="8" placeholder="Встав текст лекції..."></textarea>
<input type="file" name="file" class="form-control mt-3">
</div>

<button type="submit" class="btn btn-primary">Створити конспект</button>

</form>

<div class="mt-5">

<h3>Конспект:</h3>

<div class="card p-3">
<a href="/download?text={{ summary }}" class="btn btn-success mt-3">
Завантажити PDF
</a>
<h3 class="mt-4">Поставити питання по лекції</h3>

<form method="POST" action="/ask">

<button type="submit" class="btn btn-dark mt-2">Запитати AI</button>

<input type="text" name="question" class="form-control" placeholder="Наприклад: Яка головна тема лекції?">
<input type="file" name="file">


</form>

{% if answer %}
<div class="card p-3 mt-3">
<b>Відповідь AI:</b>
<p>{{ answer }}</p>
</div>
{% endif %}

{% if summary %}
<a href="/download?text={{ summary }}">Скачати PDF</a>
{% endif %}

<p>{{ summary | safe }}</p>



</div>

</div>

</div>

</body>
</html>
